<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Training Tracker - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0d1117;
            color: #e0e6ed;
        }

        .app-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            padding: 1rem;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        .phase-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .phase-card.locked {
            opacity: 0.5;
            pointer-events: none;
            border-color: #444c56;
        }

        .phase-card.active {
            background: #0d47a1;
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        .phase-card.completed {
            background: #238636;
            border-color: #3fb950;
            box-shadow: 0 0 15px rgba(63, 185, 80, 0.15);
        }

        .phase-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .phase-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .phase-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
        }

        .phase-badge.locked {
            background: rgba(139, 148, 158, 0.1);
            color: #8b949e;
        }

        .phase-badge.completed {
            background: rgba(63, 185, 80, 0.1);
            color: #3fb950;
        }

        .drill-item {
            display: flex;
            align-items: flex-start;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(48, 54, 61, 0.5);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .drill-item:hover {
            background: rgba(48, 54, 61, 0.8);
        }

        .drill-item.completed {
            background: rgba(63, 185, 80, 0.1);
        }

        .drill-checkbox {
            width: 1.5rem;
            height: 1.5rem;
            min-width: 1.5rem;
            margin-right: 0.75rem;
            margin-top: 0.125rem;
            cursor: pointer;
            accent-color: #58a6ff;
        }

        .drill-text {
            flex: 1;
            text-decoration: none;
        }

        .drill-item.completed .drill-text {
            text-decoration: line-through;
            color: #8b949e;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 0.875rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: #58a6ff;
            color: #0d1117;
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #30363d;
            color: #e0e6ed;
        }

        .btn-secondary:active {
            background: #444c56;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-log-shot {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, #238636, #3fb950);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1rem;
        }

        .btn-log-shot:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
        }

        .progress-container {
            background: #161b22;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #30363d;
        }

        .progress-label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #30363d;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #58a6ff, #79c0ff);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        .timer-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .timer-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 0.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #8b949e;
            font-size: 0.95rem;
        }

        .btn-reset {
            width: 100%;
            padding: 0.75rem;
            background: #da3633;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
        }

        .btn-reset:active {
            background: #f85149;
            transform: scale(0.98);
        }

        /* SHOTS HISTORY SECTION */
        .shots-history-section {
            background: rgba(13, 71, 161, 0.1);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .shots-history-title {
            font-weight: 600;
            margin-bottom: 1rem;
            color: #58a6ff;
            font-size: 0.95rem;
        }

        .shots-list {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(13, 13, 17, 0.5);
            border-radius: 6px;
            padding: 0.75rem;
        }

        .shot-entry {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid #58a6ff;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .shot-entry-text {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #e0e6ed;
            word-break: break-all;
            line-height: 1.4;
        }

        .shot-entry-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .shot-copy-btn {
            flex: 1;
            min-width: 100px;
            background: #58a6ff;
            color: #0d1117;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .shot-copy-btn:active {
            background: #79c0ff;
            transform: scale(0.95);
        }

        .shot-copy-btn.copied {
            background: #3fb950;
            color: white;
        }

        .shot-delete-btn {
            background: #da3633;
            color: white;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .shot-delete-btn:active {
            background: #f85149;
            transform: scale(0.95);
        }

        .no-shots-message {
            text-align: center;
            color: #8b949e;
            padding: 1rem;
            font-size: 0.9rem;
        }

        /* GUIDED INPUT MODAL */
        .input-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            z-index: 2000;
            padding: 1rem;
            overflow-y: auto;
        }

        .input-modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-modal {
            background: linear-gradient(135deg, #161b22 0%, #0d47a1 100%);
            border: 2px solid #58a6ff;
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.4);
        }

        .input-modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-modal-step {
            font-size: 0.9rem;
            color: #79c0ff;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-modal-metric {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
            line-height: 1.3;
        }

        .input-modal-display {
            background: #0d1117;
            border: 2px solid #58a6ff;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-modal-display-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #58a6ff;
            font-variant-numeric: tabular-nums;
            word-break: break-all;
        }

        .input-numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-numpad-btn {
            padding: 1.25rem;
            background: #30363d;
            color: #e0e6ed;
            border: 1px solid #444c56;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .input-numpad-btn:active {
            background: #444c56;
            transform: scale(0.95);
        }

        .input-numpad-btn.operator {
            background: #58a6ff;
            color: #0d1117;
            font-weight: 700;
        }

        .input-numpad-btn.operator:active {
            background: #79c0ff;
        }

        .input-numpad-btn.backspace {
            background: #da3633;
            color: white;
            grid-column: 1 / 3;
        }

        .input-numpad-btn.backspace:active {
            background: #f85149;
        }

        .input-numpad-btn.next {
            grid-column: 3;
            background: #238636;
            color: white;
            font-weight: 700;
        }

        .input-numpad-btn.next:active {
            background: #2ea043;
        }

        /* EXPORT SECTION */
        .export-section {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid #3fb950;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .export-title {
            font-weight: 600;
            color: #3fb950;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .copy-full-session-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .copy-full-session-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        .copy-feedback {
            text-align: center;
            color: #3fb950;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
        }

        .copy-feedback.show {
            display: block;
        }

        @media (max-width: 480px) {
            .timer-display {
                font-size: 3rem;
            }

            .phase-card {
                padding: 1rem;
            }

            .input-modal {
                padding: 1.5rem;
            }

            .input-modal-metric {
                font-size: 1.25rem;
            }

            .input-modal-display-value {
                font-size: 2.5rem;
            }

            .input-numpad-btn {
                padding: 1rem;
                font-size: 1.25rem;
            }

            .btn-log-shot {
                padding: 1rem;
                font-size: 1rem;
            }

            .shot-entry {
                padding: 0.75rem;
            }

            .shot-entry-text {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container mobile-optimized">
        <div class="header">
            <h1>⛳ Golf Training Tracker</h1>
            <p>Final Edition - 7-Iron Control</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-label">
                <span>Session Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Total Time Elapsed -->
        <div class="timer-container">
            <div class="timer-label">Total Elapsed Time</div>
            <div class="timer-display" id="total-timer">00:00</div>
        </div>

        <!-- Phases Container -->
        <div id="phases-container"></div>

        <!-- Export All Data Section -->
        <div class="export-section">
            <div class="export-title">📤 Copy Full Session Data</div>
            <button class="copy-full-session-btn" onclick="copyFullSession()">📋 Copy All Shots to Clipboard</button>
            <div class="copy-feedback" id="copy-feedback">✓ All shots copied to clipboard!</div>
        </div>

        <!-- Reset Button -->
        <button class="btn-reset" onclick="resetSession()">Reset Session</button>
    </div>

    <!-- Guided Input Modal -->
    <div class="input-modal-overlay" id="input-modal-overlay">
        <div class="input-modal">
            <div class="input-modal-header">
                <div class="input-modal-step" id="modal-step-text">Step 1/10</div>
                <div class="input-modal-metric" id="modal-metric-name">Attack Angle (AA)</div>
            </div>

            <div class="input-modal-display">
                <div class="input-modal-display-value" id="modal-display-value">0</div>
            </div>

            <div class="input-numpad-grid">
                <button class="input-numpad-btn" onclick="modalInput('7')">7</button>
                <button class="input-numpad-btn" onclick="modalInput('8')">8</button>
                <button class="input-numpad-btn" onclick="modalInput('9')">9</button>

                <button class="input-numpad-btn" onclick="modalInput('4')">4</button>
                <button class="input-numpad-btn" onclick="modalInput('5')">5</button>
                <button class="input-numpad-btn" onclick="modalInput('6')">6</button>

                <button class="input-numpad-btn" onclick="modalInput('1')">1</button>
                <button class="input-numpad-btn" onclick="modalInput('2')">2</button>
                <button class="input-numpad-btn" onclick="modalInput('3')">3</button>

                <button class="input-numpad-btn backspace" onclick="modalBackspace()">⌫ Backspace</button>
                <button class="input-numpad-btn operator" onclick="modalInput('0')">0</button>
                <button class="input-numpad-btn operator" onclick="modalInput('.')">.</button>

                <button class="input-numpad-btn operator" onclick="modalInput('-')">−</button>
                <button class="input-numpad-btn" style="visibility: hidden;"></button>
                <button class="input-numpad-btn next" onclick="modalNext()">→ NEXT</button>
            </div>
        </div>
    </div>

    <script>
        // ===== SHOT METRICS FIELDS WITH FULL NAMES =====
        const SHOT_FIELDS = [
            { key: "AA", label: "AA", fullName: "Attack Angle" },
            { key: "SL", label: "SL", fullName: "Spin Loft" },
            { key: "BS", label: "BS", fullName: "Ball Speed" },
            { key: "LA", label: "LA", fullName: "Launch Angle" },
            { key: "SR", label: "SR", fullName: "Spin Rate" },
            { key: "HE", label: "HE", fullName: "Height" },
            { key: "CP", label: "CP", fullName: "Club Path" },
            { key: "FP", label: "FP", fullName: "Face to Path" },
            { key: "LP", label: "LP", fullName: "Low Point" },
            { key: "Carry", label: "Carry", fullName: "Carry Distance" }
        ];

        // ===== DATA STRUCTURE & CONFIG =====
        const phases = [
            {
                id: 1,
                title: "Warm-up & Rhythm",
                duration: 15,
                drills: [
                    "Joints rotation",
                    "Wedge shots (50% power)",
                    "'Feet together' 7-iron drills"
                ],
                hasShots: true
            },
            {
                id: 2,
                title: "Contact & Low Point Control",
                duration: 30,
                drills: [
                    "'Line in the sand' visualization",
                    "Heavy Compression (AA -5.0°)",
                    "Shallow Compression (AA -2.0°)"
                ],
                hasShots: true
            },
            {
                id: 3,
                title: "Shaping Shots",
                duration: 30,
                drills: [
                    "Draw (Path +)",
                    "Straight (Zeroed)",
                    "Fade (Path -)"
                ],
                hasShots: true
            },
            {
                id: 4,
                title: "Trajectory & Distance",
                duration: 30,
                drills: [
                    "Stinger (Low)",
                    "Standard (Mid)",
                    "High Launch (High)",
                    "Challenge: Hit 3 different heights in a row"
                ],
                hasShots: true
            },
            {
                id: 5,
                title: "Pressure Test & Cool Down",
                duration: 15,
                drills: [
                    "'9 Windows' game",
                    "Stretching",
                    "Log final session summary"
                ],
                hasShots: true
            }
        ];

        const STORAGE_KEY = "golfTrackerFinalEdition";
        let sessionState = {
            startTime: null,
            totalElapsedSeconds: 0,
            phases: {}
        };

        let inputModalState = {
            isOpen: false,
            currentPhase: null,
            currentFieldIndex: 0,
            currentShot: {},
            inputBuffer: ""
        };

        // ===== INITIALIZATION =====
        function init() {
            loadSessionState();
            renderPhases();
            startGlobalTimer();
            updateProgress();
        }

        function loadSessionState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                sessionState = JSON.parse(saved);
            } else {
                sessionState = {
                    startTime: Date.now(),
                    totalElapsedSeconds: 0,
                    phases: {}
                };
                phases.forEach(phase => {
                    sessionState.phases[phase.id] = {
                        status: phase.id === 1 ? "active" : "locked",
                        drillsCompleted: new Array(phase.drills.length).fill(false),
                        shots: [],
                        timerSeconds: phase.duration * 60
                    };
                });
                saveSessionState();
            }
        }

        function saveSessionState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionState));
        }

        // ===== GLOBAL TIMER =====
        function startGlobalTimer() {
            setInterval(() => {
                const now = Date.now();
                const startTime = sessionState.startTime || now;
                sessionState.totalElapsedSeconds = Math.floor((now - startTime) / 1000);
                updateTotalTimer();
            }, 1000);
        }

        function updateTotalTimer() {
            const minutes = Math.floor(sessionState.totalElapsedSeconds / 60);
            const seconds = sessionState.totalElapsedSeconds % 60;
            document.getElementById("total-timer").textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // ===== SHOT DATA FORMATTING =====
        function formatShotWithLabels(shotObject) {
            return SHOT_FIELDS
                .map(field => `${field.label}:${shotObject[field.key]}`)
                .join(" ");
        }

        // ===== GUIDED INPUT MODAL =====
        function openInputModal(phaseId) {
            inputModalState.isOpen = true;
            inputModalState.currentPhase = phaseId;
            inputModalState.currentFieldIndex = 0;
            inputModalState.currentShot = {};
            inputModalState.inputBuffer = "";

            document.getElementById("input-modal-overlay").classList.add("active");
            updateModalDisplay();
        }

        function closeInputModal() {
            inputModalState.isOpen = false;
            document.getElementById("input-modal-overlay").classList.remove("active");
            inputModalState.currentShot = {};
            inputModalState.inputBuffer = "";
        }

        function updateModalDisplay() {
            const field = SHOT_FIELDS[inputModalState.currentFieldIndex];
            const stepNum = inputModalState.currentFieldIndex + 1;

            document.getElementById("modal-step-text").textContent = `Step ${stepNum}/10`;
            document.getElementById("modal-metric-name").textContent = `${field.fullName} (${field.label})`;
            document.getElementById("modal-display-value").textContent = inputModalState.inputBuffer || "0";
        }

        function modalInput(char) {
            if (char === '-') {
                if (!inputModalState.inputBuffer.includes('-') && inputModalState.inputBuffer !== "") {
                    inputModalState.inputBuffer = '-' + inputModalState.inputBuffer;
                } else if (inputModalState.inputBuffer === "") {
                    inputModalState.inputBuffer = '-';
                }
            } else if (char === '.') {
                if (!inputModalState.inputBuffer.includes('.')) {
                    if (inputModalState.inputBuffer === "" || inputModalState.inputBuffer === "-") {
                        inputModalState.inputBuffer += "0.";
                    } else {
                        inputModalState.inputBuffer += ".";
                    }
                }
            } else {
                inputModalState.inputBuffer += char;
            }
            document.getElementById("modal-display-value").textContent = inputModalState.inputBuffer || "0";
        }

        function modalBackspace() {
            inputModalState.inputBuffer = inputModalState.inputBuffer.slice(0, -1);
            document.getElementById("modal-display-value").textContent = inputModalState.inputBuffer || "0";
        }

        function modalNext() {
            const field = SHOT_FIELDS[inputModalState.currentFieldIndex];
            const value = inputModalState.inputBuffer || "0";

            inputModalState.currentShot[field.key] = value;
            inputModalState.inputBuffer = "";

            inputModalState.currentFieldIndex++;

            if (inputModalState.currentFieldIndex >= SHOT_FIELDS.length) {
                // All fields complete - save the shot
                saveShotFromModal();
            } else {
                updateModalDisplay();
            }
        }

        function saveShotFromModal() {
            const phaseId = inputModalState.currentPhase;
            const phaseState = sessionState.phases[phaseId];

            phaseState.shots.push(inputModalState.currentShot);
            saveSessionState();

            closeInputModal();
            renderPhases();
        }

        // ===== PHASE RENDERING =====
        function renderPhases() {
            const container = document.getElementById("phases-container");
            container.innerHTML = "";

            phases.forEach(phase => {
                const phaseState = sessionState.phases[phase.id];
                const isCompleted = phaseState.status === "completed";
                const isActive = phaseState.status === "active";
                const isLocked = phaseState.status === "locked";

                const phaseCard = document.createElement("div");
                phaseCard.className = `phase-card ${isActive ? "active" : ""} ${isCompleted ? "completed" : ""} ${isLocked ? "locked" : ""}`;

                const drillsCompleted = phaseState.drillsCompleted.filter(Boolean).length;
                const totalDrills = phase.drills.length;

                let badgeText = "🔒 Locked";
                let statusBadge = "locked";
                if (isCompleted) {
                    badgeText = "✓ Completed";
                    statusBadge = "completed";
                } else if (isActive) {
                    badgeText = "● Active";
                    statusBadge = "active";
                }

                let shotsHtml = "";
                if (phase.hasShots && !isLocked) {
                    const shotCount = phaseState.shots.length;
                    shotsHtml = `
                        <div class="shots-history-section">
                            <div class="shots-history-title">📊 Logged Shots (${shotCount})</div>
                            <button class="btn-log-shot" onclick="openInputModal(${phase.id})">
                                🎯 Log New Shot
                            </button>
                            <div class="shots-list">
                                ${phaseState.shots.length === 0 ? 
                                    `<div class="no-shots-message">No shots logged yet. Click "Log New Shot" to start.</div>` :
                                    phaseState.shots.map((shot, idx) => {
                                        const formattedShot = formatShotWithLabels(shot);
                                        return `
                                            <div class="shot-entry">
                                                <div class="shot-entry-text">${formattedShot}</div>
                                                <div class="shot-entry-actions">
                                                    <button class="shot-copy-btn" onclick="copyShotToClipboard(${phase.id}, ${idx}, '${formattedShot.replace(/'/g, "\\'")}')">📋 Copy</button>
                                                    <button class="shot-delete-btn" onclick="deleteShot(${phase.id}, ${idx})">🗑️ Delete</button>
                                                </div>
                                            </div>
                                        `;
                                    }).join("")
                                }
                            </div>
                        </div>
                    `;
                }

                phaseCard.innerHTML = `
                    <div class="phase-header">
                        <div>
                            <div class="phase-title">Phase ${phase.id}: ${phase.title}</div>
                            <div style="color: #79c0ff; font-size: 0.875rem; font-weight: 600;">${phase.duration} minutes</div>
                        </div>
                        <span class="phase-badge ${statusBadge}">${badgeText}</span>
                    </div>

                    <div id="phase-${phase.id}-drills" class="drills-list">
                        ${phase.drills.map((drill, idx) => `
                            <label class="drill-item ${phaseState.drillsCompleted[idx] ? "completed" : ""}">
                                <input type="checkbox" class="drill-checkbox" 
                                    data-phase="${phase.id}" data-drill="${idx}"
                                    ${phaseState.drillsCompleted[idx] ? "checked" : ""}
                                    ${isLocked ? "disabled" : ""}
                                    onchange="toggleDrill(${phase.id}, ${idx})">
                                <span class="drill-text">${drill}</span>
                            </label>
                        `).join("")}
                    </div>

                    ${shotsHtml}

                    <div class="button-group">
                        ${!isCompleted ? `
                            <button class="btn btn-primary" 
                                onclick="completePhase(${phase.id})"
                                ${drillsCompleted < totalDrills || isLocked ? "disabled" : ""}>
                                Mark Complete
                            </button>
                        ` : ""}
                        ${isCompleted && phase.id < phases.length ? `
                            <button class="btn btn-secondary" onclick="resetPhase(${phase.id})">Redo Phase</button>
                        ` : ""}
                    </div>
                `;

                container.appendChild(phaseCard);
            });
        }

        // ===== PHASE ACTIONS =====
        function toggleDrill(phaseId, drillIndex) {
            const phaseState = sessionState.phases[phaseId];
            phaseState.drillsCompleted[drillIndex] = !phaseState.drillsCompleted[drillIndex];
            saveSessionState();
            renderPhases();
        }

        function deleteShot(phaseId, shotIndex) {
            if (confirm("Delete this shot?")) {
                sessionState.phases[phaseId].shots.splice(shotIndex, 1);
                saveSessionState();
                renderPhases();
            }
        }

        function copyShotToClipboard(phaseId, shotIndex, formattedText) {
            navigator.clipboard.writeText(formattedText).then(() => {
                // Find the button and change its appearance
                const buttons = document.querySelectorAll('.shot-copy-btn');
                let shotCount = 0;
                
                for (let pid = 1; pid <= phaseId; pid++) {
                    if (pid < phaseId) {
                        shotCount += sessionState.phases[pid].shots.length;
                    }
                }
                shotCount += shotIndex;

                const button = buttons[shotCount];
                if (button) {
                    const originalText = button.textContent;
                    button.textContent = "✓ Copied!";
                    button.classList.add("copied");

                    setTimeout(() => {
                        button.textContent = originalText;
                        button.classList.remove("copied");
                    }, 2000);
                }
            }).catch(() => {
                alert("Could not copy to clipboard.");
            });
        }

        function completePhase(phaseId) {
            const phaseState = sessionState.phases[phaseId];
            const phase = phases.find(p => p.id === phaseId);

            const allCompleted = phaseState.drillsCompleted.every(Boolean);
            if (!allCompleted) {
                alert("Please complete all drills before marking the phase as complete.");
                return;
            }

            phaseState.status = "completed";

            if (phaseId < phases.length) {
                sessionState.phases[phaseId + 1].status = "active";
            }

            saveSessionState();
            updateProgress();
            renderPhases();
        }

        function resetPhase(phaseId) {
            const phase = phases.find(p => p.id === phaseId);
            const phaseState = sessionState.phases[phaseId];
            phaseState.drillsCompleted = new Array(phase.drills.length).fill(false);
            phaseState.status = "active";
            phaseState.shots = [];
            saveSessionState();
            renderPhases();
        }

        // ===== PROGRESS CALCULATION =====
        function updateProgress() {
            let completedPhases = 0;
            phases.forEach(phase => {
                if (sessionState.phases[phase.id].status === "completed") {
                    completedPhases++;
                }
            });

            const percentage = Math.round((completedPhases / phases.length) * 100);
            document.getElementById("progress-fill").style.width = percentage + "%";
            document.getElementById("progress-text").textContent = percentage + "%";
        }

        // ===== EXPORT FUNCTIONALITY =====
        function copyFullSession() {
            let exportLines = [];

            phases.forEach(phase => {
                const phaseState = sessionState.phases[phase.id];
                if (phaseState.shots.length > 0) {
                    exportLines.push(`[Phase ${phase.id}: ${phase.title}]`);
                    phaseState.shots.forEach(shot => {
                        const formattedShot = formatShotWithLabels(shot);
                        exportLines.push(formattedShot);
                    });
                    exportLines.push(""); // blank line between phases
                }
            });

            if (exportLines.length === 0) {
                alert("No shots logged yet. Please log shots in the training phases.");
                return;
            }

            const exportText = exportLines.join("\n");

            navigator.clipboard.writeText(exportText).then(() => {
                const feedback = document.getElementById("copy-feedback");
                feedback.classList.add("show");
                setTimeout(() => {
                    feedback.classList.remove("show");
                }, 2000);
            }).catch(() => {
                alert("Could not copy to clipboard.");
            });
        }

        // ===== RESET SESSION =====
        function resetSession() {
            if (confirm("Are you sure you want to reset the entire session? This cannot be undone.")) {
                localStorage.removeItem(STORAGE_KEY);
                sessionState = {
                    startTime: Date.now(),
                    totalElapsedSeconds: 0,
                    phases: {}
                };
                phases.forEach(phase => {
                    sessionState.phases[phase.id] = {
                        status: phase.id === 1 ? "active" : "locked",
                        drillsCompleted: new Array(phase.drills.length).fill(false),
                        shots: [],
                        timerSeconds: phase.duration * 60
                    };
                });
                saveSessionState();
                renderPhases();
                updateProgress();
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
