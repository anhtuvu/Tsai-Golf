<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tsai Golf">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1099/1099680.png">
    <title>Golf Tracker Ultimate v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS CUSTOM ĐỂ GIỮ NGUYÊN GIAO DIỆN CHUYÊN NGHIỆP CỦA BẠN */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e0e6ed;
            -webkit-touch-callout: none;
        }
        .timer-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: #58a6ff;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }
        .phase-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .phase-card.active {
            background: #0d47a1;
            border-color: #58a6ff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .phase-card.locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .phase-card.completed { border-color: #3fb950; background: #1c2128; }
        
        .drill-item {
            display: flex;
            align-items: center;
            padding: 0.85rem;
            margin-bottom: 0.6rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
        }
        .drill-item.completed {
            background: rgba(63, 185, 80, 0.1);
            opacity: 0.7;
        }
        .drill-item.completed span { text-decoration: line-through; color: #8b949e; }

        /* MODAL INPUT PHONG CÁCH PHÒNG TẬP HIỆN ĐẠI */
        .input-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .input-modal-overlay.active { display: flex; }
        .input-modal {
            background: #161b22;
            border: 2px solid #58a6ff;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(88, 166, 255, 0.3);
        }

        .numpad-btn {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 1.5rem 1rem;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.1s;
            color: #f0f6fc;
        }
        .numpad-btn:active { background: #58a6ff; color: #0d1117; transform: scale(0.92); }
        .numpad-btn.next { background: #238636; color: white; border: none; }
        .numpad-btn.backspace { background: #da3633; color: white; grid-column: span 2; }

        .shot-log-row {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            background: #0d1117;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-top: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="app-container max-w-2xl mx-auto">
        <div class="text-center py-8">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Tsai Golf Tracker</h1>
            <p class="text-blue-400 font-bold text-xs tracking-widest uppercase mt-1">Total Control 7-Iron Edition</p>
        </div>

        <div class="px-4 mb-8">
            <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-gray-500 uppercase">Mastery Progress</span>
                <span id="progress-percent" class="text-xl font-black text-blue-500">0%</span>
            </div>
            <div class="h-3 w-full bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-600 to-blue-400 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="timer-container text-center mb-10">
            <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Live Session Time</div>
            <div id="global-timer" class="timer-display">00:00:00</div>
        </div>

        <div id="phases-list" class="px-4 pb-20">
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-black/80 backdrop-blur-md border-t border-gray-800 flex gap-3">
            <button onclick="copyFullSession()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-wider shadow-lg">Copy Full Log</button>
            <button onclick="resetApp()" class="bg-red-900/50 text-red-400 px-6 rounded-xl font-bold border border-red-900">Reset</button>
        </div>
    </div>

    <div id="entry-modal" class="input-modal-overlay">
        <div class="input-modal">
            <div class="flex justify-between items-center mb-6">
                <span id="modal-step-count" class="text-blue-500 font-black text-sm tracking-tighter uppercase">Step 1/11</span>
                <button onclick="closeModal()" class="text-gray-500">✕ Close</button>
            </div>
            <div class="text-center mb-6">
                <h2 id="modal-field-name" class="text-3xl font-black text-white uppercase tracking-tight">CARRY</h2>
                <p class="text-gray-500 text-xs mt-1 uppercase font-bold">Input measured data</p>
            </div>
            <div class="bg-black border-2 border-blue-600 rounded-2xl py-6 mb-8 text-center">
                <span id="display-value" class="text-6xl font-black text-blue-400">0</span>
            </div>
            <div class="grid grid-cols-3 gap-3 numpad-grid">
                <button class="numpad-btn" onclick="press('7')">7</button>
                <button class="numpad-btn" onclick="press('8')">8</button>
                <button class="numpad-btn" onclick="press('9')">9</button>
                <button class="numpad-btn" onclick="press('4')">4</button>
                <button class="numpad-btn" onclick="press('5')">5</button>
                <button class="numpad-btn" onclick="press('6')">6</button>
                <button class="numpad-btn" onclick="press('1')">1</button>
                <button class="numpad-btn" onclick="press('2')">2</button>
                <button class="numpad-btn" onclick="press('3')">3</button>
                <button class="numpad-btn" onclick="press('.')">.</button>
                <button class="numpad-btn" onclick="press('0')">0</button>
                <button class="numpad-btn" onclick="press('-')">−</button>
                <button class="numpad-btn backspace" onclick="press('C')">CLEAR</button>
                <button class="numpad-btn next" onclick="press('N')">NEXT →</button>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION
        const CONFIG = {
            fields: [
                { id: 'Carry', label: 'Carry' }, { id: 'Total', label: 'Total' },
                { id: 'BS', label: 'BS' }, { id: 'Smash', label: 'Smash' },
                { id: 'CP', label: 'CP' }, { id: 'FP', label: 'FP' },
                { id: 'LP', label: 'LP' }, { id: 'AA', label: 'AA' },
                { id: 'LA', label: 'LA' }, { id: 'Land', label: 'Land' },
                { id: 'SR', label: 'SR' }
            ],
            phases: [
                { id: 1, title: "Warm-up & Rhythm", drills: ["Joints rotation", "Wedge shots (50%)", "Feet together 7i drills"] },
                { id: 2, title: "Contact & Low Point", drills: ["Line visualization", "Heavy Compression (AA -5)", "Shallow Compression (AA -2)"] },
                { id: 3, title: "Shaping Shots", drills: ["Draw (Path +)", "Straight (Zeroed)", "Fade (Path -)"] },
                { id: 4, title: "Trajectory & Distance", drills: ["Stinger (Low)", "Standard (Mid)", "High Launch (High)"] },
                { id: 5, title: "Pressure & Cool Down", drills: ["9 Windows game", "Stretching", "Session review"] }
            ]
        };

        // 2. STATE MANAGEMENT
        let db = JSON.parse(localStorage.getItem('TsaiGolfDB')) || {
            startTime: Date.now(),
            activePhase: 1,
            completedPhases: [],
            drillStatus: {},
            shots: {}
        };

        let inputState = { step: 0, buffer: "", activePhaseId: null, data: {} };

        // 3. CORE FUNCTIONS
        function render() {
            const list = document.getElementById('phases-list');
            list.innerHTML = CONFIG.phases.map(p => {
                const isActive = db.activePhase === p.id;
                const isDone = db.completedPhases.includes(p.id);
                const isLocked = !isActive && !isDone;

                return `
                <div class="phase-card ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''} ${isLocked ? 'locked' : ''}">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-black uppercase italic">${p.title}</h3>
                        <span class="text-[10px] font-black bg-white/10 px-2 py-1 rounded-md uppercase">
                            ${isDone ? 'Done' : (isActive ? 'Active' : 'Locked')}
                        </span>
                    </div>

                    <div class="space-y-2 mb-6">
                        ${p.drills.map((d, i) => {
                            const dId = `${p.id}-${i}`;
                            const checked = db.drillStatus[dId];
                            return `
                            <div class="drill-item ${checked ? 'completed' : ''}" onclick="toggleDrill('${dId}')">
                                <div class="w-5 h-5 rounded border-2 border-blue-500 mr-3 flex items-center justify-center">
                                    ${checked ? '<div class="w-3 h-3 bg-blue-400 rounded-sm"></div>' : ''}
                                </div>
                                <span class="font-bold text-sm text-gray-300">${d}</span>
                            </div>`;
                        }).join('')}
                    </div>

                    ${isActive ? `<button onclick="openModal(${p.id})" class="w-full bg-white text-black font-black py-4 rounded-xl mb-4 uppercase tracking-tighter">🎯 Log Performance</button>` : ''}
                    
                    <div class="space-y-2 mb-4">
                        ${(db.shots[p.id] || []).map((s, idx) => `
                            <div class="shot-log-row">
                                <span class="text-blue-300 font-bold">#${idx+1}</span>
                                <span class="flex-1 px-3 text-[10px] opacity-80">${s}</span>
                                <button onclick="copyRaw('${btoa(s)}')" class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-[10px] font-black">COPY</button>
                            </div>
                        `).join('')}
                    </div>

                    ${isActive ? `<button onclick="finishPhase(${p.id})" class="w-full py-2 text-white/50 font-bold text-xs border-t border-white/10 pt-4 uppercase">Complete Phase →</button>` : ''}
                </div>`;
            }).join('');
            updateMeta();
        }

        // 4. INPUT LOGIC
        function openModal(pid) {
            inputState = { step: 0, buffer: "", activePhaseId: pid, data: {} };
            document.getElementById('entry-modal').classList.add('active');
            updateModalUI();
        }

        function press(key) {
            if (key === 'C') { inputState.buffer = ""; }
            else if (key === 'N') { commitStep(); }
            else { inputState.buffer += key; }
            document.getElementById('display-value').innerText = inputState.buffer || "0";
        }

        function commitStep() {
            const field = CONFIG.fields[inputState.step];
            let value = inputState.buffer || "0";
            if (field.id === 'LP') value += "A"; // AUTO APPEND 'A' FOR LOW POINT
            
            inputState.data[field.id] = value;
            
            if (inputState.step < CONFIG.fields.length - 1) {
                inputState.step++;
                inputState.buffer = "";
                updateModalUI();
            } else {
                saveFinalShot();
            }
        }

        function saveFinalShot() {
            const shotStr = CONFIG.fields.map(f => `${f.label}:${inputState.data[f.id]}`).join(" ");
            const pid = inputState.activePhaseId;
            if(!db.shots[pid]) db.shots[pid] = [];
            db.shots[pid].unshift(shotStr);
            save();
            closeModal();
            render();
        }

        function updateModalUI() {
            const field = CONFIG.fields[inputState.step];
            document.getElementById('modal-step-count').innerText = `Step ${inputState.step + 1}/11`;
            document.getElementById('modal-field-name').innerText = field.label;
            document.getElementById('display-value').innerText = "0";
        }

        // 5. UTILS
        function toggleDrill(id) { db.drillStatus[id] = !db.drillStatus[id]; save(); render(); }
        function finishPhase(id) { if(id < 5) db.activePhase = id + 1; db.completedPhases.push(id); save(); render(); }
        function updateMeta() {
            const p = (db.completedPhases.length / 5) * 100;
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('progress-percent').innerText = Math.round(p) + '%';
        }
        function startTimers() {
            setInterval(() => {
                const diff = Math.floor((Date.now() - db.startTime) / 1000);
                const h = Math.floor(diff/3600); const m = Math.floor((diff%3600)/60); const s = diff%60;
                document.getElementById('global-timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }
        function save() { localStorage.setItem('TsaiGolfDB', JSON.stringify(db)); }
        function closeModal() { document.getElementById('entry-modal').classList.remove('active'); }
        function copyRaw(b) { navigator.clipboard.writeText(atob(b)); alert("Copied Shot!"); }
        function copyFullSession() {
            const txt = Object.entries(db.shots).map(([id, list]) => `PHASE ${id}:\n${list.join('\n')}`).join('\n\n');
            navigator.clipboard.writeText(txt); alert("All session data copied!");
        }
        function resetApp() { if(confirm("Clear all data and restart session?")) { localStorage.clear(); location.reload(); } }

        // START
        render(); startTimers();
    </script>
</body>
</html>
